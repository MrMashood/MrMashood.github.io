  <script>
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, dots = [], mouse = { x: -999, y: -999 };
    const SPACING = 38, COLOR = 'rgba(255,255,255,';

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      dots = [];
      for (let x = SPACING; x < W; x += SPACING)
        for (let y = SPACING; y < H; y += SPACING)
          dots.push({ x, y, ox: x, oy: y });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() * 0.0008;
      dots.forEach(d => {
        const dx = d.x - mouse.x, dy = d.y - mouse.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const repel = Math.max(0, 1 - dist / 130);
        const wave = Math.sin(d.ox * 0.025 + d.oy * 0.018 + t) * 0.5 + 0.5;
        const alpha = 0.05 + wave * 0.09 + repel * 0.55;
        const r = 1.2 + repel * 2.8;
        ctx.beginPath();
        ctx.arc(d.x + repel * dx * -0.3, d.y + repel * dy * -0.3, r, 0, Math.PI * 2);
        ctx.fillStyle = COLOR + alpha + ')';
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    resize(); draw();

    setTimeout(() => {
      document.querySelectorAll('.reveal-line, .reveal-fade').forEach(el => el.classList.add('visible'));
    }, 80);
  </script>
